<!DOCTYPE html>
<html>
<head>
    <title>Order System</title>
</head>
<body>

<h2>Order Management</h2>
<button onclick="showOrders()">Show Orders</button>

<div id="output"></div>

<script>
let orders = [
    {
        id: 1,
        items: [
            { name: "Pen", price: 10, qty: 2 },
            { name: "Book", price: 50, qty: 1 }
        ]
    },
    {
        id: 2,
        items: [
            { name: "Bag", price: 500, qty: 1 },
            { name: "Bottle", price: 100, qty: 3 }
        ]
    }
];

function showOrders() {

    let result = orders.map(order => {

        let totalAmount = order.items.reduce((sum, item) =>{
      return   sum + item.price * item.qty;
        },0);
        

        let totalQty = order.items.reduce((sum, item) =>{
          return   sum + item.qty;
            }, 0);
        return {
            ...order,
            totalAmount,
            totalQty
        };
    });

   
  let html = "";
    result.forEach(order => {
       

         html += `<p>
            Order ID: ${order.id} <br>
            Total Amount: ${order.totalAmount} <br>
            Total Quantity: ${order.totalQty}
        </p>`;
    });

    document.getElementById("output").innerHTML = html;
}
</script>

</body>
</html>
